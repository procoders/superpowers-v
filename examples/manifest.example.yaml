# Compound V execution manifest — worked example (mirrors PRD §5.1).
# Materialized from the verified Partition Map + Routing Policy, one per run, at
# docs/superpowers/execution/<run-id>/manifest.yaml. Validated by
# scripts/compound-v-validate-manifest.py. Schema + rules:
# skills/compound-v/execution-manifest.md.
#
# Jobs route by INTENT (tier + effort), not by hardcoded model strings. The
# dispatcher resolves (backend, tier, effort) → a concrete model via
# scripts/compound-v-resolve-model.py before invoking the backend. A job may
# instead carry an explicit `model:` override (see task-1-editor-ui below),
# which skips resolution and stays valid — backward compatible.

run_id: 2026-06-26-linkedin-sequence-editor
feature: "LinkedIn outreach sequence editor"
spec_path: docs/superpowers/specs/2026-06-26-linkedin-sequence.md
plan_path: docs/superpowers/plans/2026-06-26-linkedin-sequence.md
audits:
  archaeology: docs/superpowers/archaeology/2026-06-26-linkedin-sequence.md
  domain: docs/superpowers/expert/2026-06-26-linkedin-sequence.md
  library: docs/superpowers/library-audit/2026-06-26-linkedin-sequence.md

# Feature-level Acceptance Criteria — the final integration review gates DONE on these.
acceptance_criteria:
  - "User can create / edit / delete sequence steps"
  - "Sequence persists across reload"
  - "No write outside the partitioned file sets"

routing_stance: balanced            # balanced | conservative | cost-aware | claude-only
max_parallel: 5                     # batch ceiling (phase-3 concurrency reality)

jobs:
  - id: task-0-schema
    title: "DB schema + migration + shared types"
    type: shared_foundation
    backend: claude
    tier: deep                      # shared foundation ⇒ deep (strongest reasoning)
    effort: high
    isolation: direct               # serial pre-phase; no sibling can race it
    run: serial
    write_allowed:
      - "db/migrations/*"
      - "src/db/schema.ts"
      - "src/types/sequence.ts"
    read_allowed:
      - "src/db/**"
    acceptance:
      - "migration applies cleanly"
      - "types exported"

  - id: task-1-editor-ui
    title: "Sequence editor UI slice"
    type: large_isolated
    backend: codex
    # Explicit model override: skips resolution, stays valid (backward-compatible).
    # Demonstrates that a pinned model still works alongside tier/effort routing.
    model: gpt-5.5
    effort: medium                  # large isolated codex work ⇒ standard-ish, medium effort
    isolation: worktree             # Codex ⇒ always worktree
    run: parallel
    depends_on:
      - task-0-schema
    write_allowed:
      - "src/features/sequences/components/**"
    read_allowed:
      - "src/features/sequences/**"
      - "src/shared/ui/**"
      - "src/types/sequence.ts"
    acceptance:
      - "create/edit/delete steps"
      - "no writes outside components/**"

  - id: task-2-api
    title: "Sequence CRUD API slice"
    type: bounded_crud
    backend: claude
    tier: standard                  # bounded core/feature build ⇒ standard
    effort: medium
    isolation: direct
    run: parallel
    depends_on:
      - task-0-schema
    write_allowed:
      - "src/features/sequences/api/**"
    read_allowed:
      - "src/server/**"
      - "src/types/sequence.ts"
    acceptance:
      - "CRUD endpoints"
      - "input validation"

  - id: task-3-docs
    title: "Sequence editor user docs"
    type: docs
    backend: claude
    tier: light                     # mechanical single-file / docs ⇒ light
    effort: low
    isolation: direct
    run: parallel
    depends_on:
      - task-1-editor-ui
      - task-2-api
    write_allowed:
      - "docs/features/sequences.md"
    read_allowed:
      - "src/features/sequences/**"
    acceptance:
      - "documents create/edit/delete flow"

  - id: task-4-review
    title: "Integration review of the sequence editor"
    type: review
    backend: claude
    tier: deep                      # ALL reviewers ⇒ deep (resolves to opus)
    effort: high
    isolation: direct
    run: serial
    depends_on:
      - task-1-editor-ui
      - task-2-api
      - task-3-docs
    write_allowed: []               # reviewers write nothing
    read_allowed:
      - "src/features/sequences/**"
      - "docs/features/sequences.md"
    acceptance:
      - "feature-level acceptance criteria met"
      - "no writes outside partitioned sets across jobs"
