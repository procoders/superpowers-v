<svg viewBox="0 0 1060 892" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <title>How Compound V decides who does the work</title>
  <desc>A request goes through Pre-Evaluation: simple work takes the cheap fast path, complex work enters the full pipeline where an orchestrator splits it and a deterministic router picks one of three worker modes per job: full Opus, cheap Sonnet, or Sonnet with an on-demand advisor.</desc>

  <defs>
    <linearGradient id="brandbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1195f2"/><stop offset="0.5" stop-color="#6565f2"/><stop offset="1" stop-color="#dc02df"/>
    </linearGradient>
    <marker id="aN" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#6a6d90"/></marker>
    <marker id="aV" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#6565f2"/></marker>
    <filter id="gMag" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#dc02df" flood-opacity="0.55"/></filter>
    <filter id="gBlue" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#1195f2" flood-opacity="0.55"/></filter>
    <filter id="gVio" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#6565f2" flood-opacity="0.55"/></filter>
  </defs>

  <rect x="0" y="0" width="1060" height="892" fill="#0b0b22"/>
  <rect x="0" y="0" width="1060" height="6" fill="url(#brandbar)"/>

  <text x="40" y="58" font-size="28" font-weight="800" letter-spacing="-0.4" fill="#ebebee">How Compound&#160;V decides who does the work</text>
  <text x="40" y="84" font-size="13" font-family="ui-monospace, 'SF Mono', Menlo, monospace" letter-spacing="2.5" fill="#7f86a8">TWO FORKS  ·  THREE WORKER MODES  ·  THE CODE DECIDES, NOT THE WORKER</text>

  <rect x="440" y="108" width="180" height="48" rx="10" fill="#111133" stroke="#575868" stroke-width="1.3"/>
  <text x="530" y="138" font-size="16.5" font-weight="700" text-anchor="middle" fill="#ebebee">Your request</text>
  <line x1="530" y1="156" x2="530" y2="184" stroke="#6a6d90" stroke-width="1.6" marker-end="url(#aN)"/>

  <rect x="415" y="186" width="230" height="66" rx="10" fill="#111133" stroke="#575868" stroke-width="1.6"/>
  <text x="530" y="213" font-size="17" font-weight="700" text-anchor="middle" fill="#ebebee">Pre-Evaluation</text>
  <text x="530" y="235" font-size="13.5" text-anchor="middle" fill="#aeb0c2">simple or complex?</text>

  <path d="M415 219 L250 219 L250 248" fill="none" stroke="#6a6d90" stroke-width="1.6" marker-end="url(#aN)"/>
  <text x="332" y="211" font-size="11.5" font-family="ui-monospace, monospace" letter-spacing="1" fill="#7f86a8">SIMPLE →</text>
  <rect x="60" y="250" width="270" height="66" rx="10" fill="#111133" stroke="#575868" stroke-width="1.3"/>
  <text x="195" y="277" font-size="16" font-weight="700" text-anchor="middle" fill="#ebebee">Fast path</text>
  <text x="195" y="298" font-size="13" text-anchor="middle" fill="#aeb0c2">one cheap worker</text>
  <text x="195" y="338" font-size="12" text-anchor="middle" fill="#7f86a8">can call an advisor</text>
  <text x="195" y="354" font-size="12" text-anchor="middle" fill="#7f86a8">if it hits something hard</text>

  <line x1="530" y1="252" x2="530" y2="292" stroke="#6a6d90" stroke-width="1.6" marker-end="url(#aN)"/>
  <text x="546" y="276" font-size="11.5" font-family="ui-monospace, monospace" letter-spacing="1" fill="#7f86a8">COMPLEX ↓</text>

  <rect x="405" y="294" width="250" height="66" rx="10" fill="#111133" stroke="#dc02df" stroke-width="1.6" filter="url(#gMag)"/>
  <text x="530" y="321" font-size="16.5" font-weight="800" text-anchor="middle" fill="#f06bf2">Orchestrator</text>
  <text x="530" y="343" font-size="13" text-anchor="middle" fill="#aeb0c2">Opus/Fable  ·  splits the work</text>
  <line x1="530" y1="360" x2="530" y2="396" stroke="#6a6d90" stroke-width="1.6" marker-end="url(#aN)"/>

  <rect x="400" y="398" width="260" height="66" rx="10" fill="#111133" stroke="#1195f2" stroke-width="1.8" filter="url(#gBlue)"/>
  <text x="530" y="425" font-size="16.5" font-weight="800" text-anchor="middle" fill="#4db3f7">Router</text>
  <text x="530" y="446" font-size="13" text-anchor="middle" fill="#aeb0c2">code inspects each job, one by one</text>

  <path d="M470 464 L200 520" fill="none" stroke="#6a6d90" stroke-width="1.5" marker-end="url(#aN)"/>
  <path d="M530 464 L530 520" fill="none" stroke="#6a6d90" stroke-width="1.5" marker-end="url(#aN)"/>
  <path d="M590 464 L858 520" fill="none" stroke="#6a6d90" stroke-width="1.5" marker-end="url(#aN)"/>

  <text x="195" y="511" font-size="11" font-family="ui-monospace, monospace" letter-spacing="0.6" text-anchor="middle" fill="#7f86a8">RISKY · REVIEW · SECURITY</text>
  <text x="530" y="511" font-size="11" font-family="ui-monospace, monospace" letter-spacing="0.6" text-anchor="middle" fill="#7f86a8">ROUTINE · MECHANICAL · TINY</text>
  <text x="862" y="511" font-size="11" font-family="ui-monospace, monospace" letter-spacing="0.6" text-anchor="middle" fill="#7f86a8">MEDIUM · SELF-CONTAINED</text>

  <rect x="60" y="522" width="270" height="72" rx="10" fill="#111133" stroke="#dc02df" stroke-width="1.6" filter="url(#gMag)"/>
  <text x="195" y="551" font-size="16" font-weight="800" text-anchor="middle" fill="#f06bf2">Full Opus</text>
  <text x="195" y="573" font-size="13" text-anchor="middle" fill="#aeb0c2">strong model on everything</text>

  <rect x="395" y="522" width="270" height="72" rx="10" fill="#111133" stroke="#575868" stroke-width="1.4"/>
  <text x="530" y="551" font-size="16" font-weight="700" text-anchor="middle" fill="#ebebee">Sonnet solo</text>
  <text x="530" y="573" font-size="13" text-anchor="middle" fill="#aeb0c2">cheap, nothing to advise</text>

  <rect x="728" y="522" width="270" height="72" rx="10" fill="#111133" stroke="#575868" stroke-width="1.4"/>
  <text x="863" y="551" font-size="16" font-weight="700" text-anchor="middle" fill="#ebebee">Sonnet + advisor</text>
  <text x="863" y="573" font-size="12.5" text-anchor="middle" fill="#aeb0c2">the cheap one calls the pricey one</text>
  <rect x="820" y="452" width="178" height="42" rx="8" fill="#14143a" stroke="#6565f2" stroke-width="1.4" stroke-dasharray="5 4" filter="url(#gVio)"/>
  <text x="909" y="472" font-size="13.5" font-weight="800" text-anchor="middle" fill="#9b9bf7">Opus/Fable</text>
  <text x="909" y="487" font-size="11" text-anchor="middle" fill="#aeb0c2">advisor · on call</text>
  <path d="M878 522 L878 496" fill="none" stroke="#6565f2" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#aV)"/>
  <path d="M905 496 L905 522" fill="none" stroke="#6565f2" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#aV)"/>

  <path d="M195 594 L195 644 L530 644" fill="none" stroke="#6a6d90" stroke-width="1.5"/>
  <path d="M530 594 L530 644" fill="none" stroke="#6a6d90" stroke-width="1.5"/>
  <path d="M863 594 L863 644 L530 644" fill="none" stroke="#6a6d90" stroke-width="1.5"/>
  <line x1="530" y1="644" x2="530" y2="672" stroke="#6a6d90" stroke-width="1.6" marker-end="url(#aN)"/>

  <rect x="230" y="674" width="600" height="52" rx="10" fill="#181842" stroke="#575868" stroke-width="1.3"/>
  <text x="530" y="699" font-size="14.5" font-weight="700" text-anchor="middle" fill="#ebebee">In parallel → git scope check → Opus review → done</text>
  <text x="530" y="717" font-size="12" text-anchor="middle" fill="#8890a8">workers run at once, each in its own mode</text>

  <rect x="230" y="750" width="600" height="94" rx="10" fill="#111133" stroke="#2a2a52" stroke-width="1.2"/>
  <rect x="252" y="768" width="20" height="14" rx="3" fill="#111133" stroke="#dc02df" stroke-width="1.6"/>
  <text x="282" y="780" font-size="12.5" fill="#cdcfdd">expensive model working (Opus/Fable)</text>
  <rect x="252" y="792" width="20" height="14" rx="3" fill="#111133" stroke="#575868" stroke-width="1.4"/>
  <text x="282" y="804" font-size="12.5" fill="#cdcfdd">cheap model (Sonnet)</text>
  <rect x="252" y="816" width="20" height="14" rx="3" fill="#14143a" stroke="#6565f2" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="282" y="828" font-size="12.5" fill="#cdcfdd">called only on demand (advisor)</text>
  <text x="566" y="776" font-size="11.5" font-family="ui-monospace, monospace" letter-spacing="1.5" fill="#4db3f7">THE KEY RULE</text>
  <text x="566" y="796" font-size="12" fill="#cdcfdd">the ROUTER picks the mode by job type</text>
  <text x="566" y="813" font-size="12" fill="#cdcfdd">(which files, risk, is it a review):</text>
  <text x="566" y="830" font-size="12" fill="#cdcfdd">deterministic. The worker never chooses.</text>
</svg>
